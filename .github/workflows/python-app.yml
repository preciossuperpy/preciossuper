name: Scraper Canasta

on:
  # a) Ejecución automática: lunes-sábado a las 07 h 30 (Asunción −03),
  #    que equivale a 10 h 30 UTC
  schedule:
    - cron:  '30 10 * * 1-6'
  # b) Lanzamiento manual desde la pestaña ‘Actions’
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute scraper
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          OUT_DIR: ${{ secrets.OUT_DIR }}
        run: |
          python canasta_scraper.py

      # (opcional) Publicar CSVs como artefactos para inspección
      - name: Upload CSV artifacts
        if: success() && env.OUT_DIR != ''
        uses: actions/upload-artifact@v4
        with:
          name: canasta-csvs
          path: ${{ env.OUT_DIR }}/*.csv
