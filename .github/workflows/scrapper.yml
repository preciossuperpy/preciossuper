name: Scraper Canasta

on:
  schedule:
    - cron:  '30 10 * * 1-6'   # lunes–sábado 07:30 Asunción (10:30 UTC)
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute scraper
        # NO pasamos OUT_DIR aquí; el script usará "/tmp/csvs" si no existe

        env:
          OUT_DIR: /tmp/csvs
          GOOGLE_CREDS:    ${{ secrets.GOOGLE_CREDS }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
        run: |
          python canasta_scraper.py

      - name: Upload CSV artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: canasta-csvs
          path: /tmp/csvs/*.csv
